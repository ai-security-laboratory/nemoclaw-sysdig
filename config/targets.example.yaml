# Copy this file to ../targets.yaml (outside the repo, next to your SSH key) and fill in your values.
# Never commit targets.yaml — it contains IPs and key paths.
#
# sandbox_name must match the name you chose during `nemoclaw onboard` on the VM.

targets:
  oracle-vm:
    host: 1.2.3.4                          # VM public IP or hostname
    user: ubuntu                           # SSH user
    ssh_key: ~/path/to/ssh-key.key         # SSH private key path
    sandbox_name: openclaw                 # NemoClaw sandbox name
    provider: build                        # Inference provider (build = build.nvidia.com)
    model: nvidia/llama-3.3-nemotron-super-49b-v1   # Model to use
    tags:
      - oracle
      - dev

  prod-vm:
    host: vm.example.internal
    user: ubuntu
    ssh_key: ~/path/to/ssh-key.key
    sandbox_name: openclaw-prod
    provider: build
    model: nvidia/nemotron-super-49b-v1
    tags:
      - oracle
      - prod
